<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mirrored Cipher</title>
</head>
<body>

<h1>Mirrored Cipher</h1>
<p><label>Enter Message: <input type="text" id="plaintext" value="hello"></label></p>
<p><button onclick="encode()">Encode</button></p>
<p id="result"></p>

<script>
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const shift = 2;
    // const is a keyword used to declare variables that cannot be reassigned

    function mirrorLetter(letter) {
        let i = chars.indexOf(letter);
        return chars[25 - i];
    }

    function encode() {
        let plaintext = document.getElementById("plaintext").value.toUpperCase();
        let ciphertext = "";

        for (let i = 0; i < plaintext.length; i++) {
            let letter = plaintext[i];
            let mirrored = mirrorLetter(letter);
            let index = (chars.indexOf(mirrored) + shift) % 26;
            ciphertext += chars[index];
        }

        document.getElementById("result").innerText = "Encoded: " + ciphertext;
    }
</script>

</body>
</html>
