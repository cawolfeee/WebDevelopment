<script>
    document.getElementById("add").onclick = () => {
        const taskName = document.getElementById("task").value;
        const taskDate = document.getElementById("date").value;
        new_task(taskName, taskDate);
    };

    function setCookie(cname, cvalue, exdays) {
        const d = new Date();
        d.setTime(d.getTime() + (exdays*24*60*60*1000));
        let expires = "expires="+ d.toUTCString();
        document.cookie = cname + "=" + cvalue + ";" + expires + ";path=/";
    }


    function getCookie(cname) {
        let name = cname + "=";
        let decodedCookie = decodeURIComponent(document.cookie);
        let ca = decodedCookie.split(';');
        for(let i = 0; i <ca.length; i++) {
            let c = ca[i];
            while (c.charAt(0) == ' ') {
                c = c.substring(1);
            }
            if (c.indexOf(name) == 0) {
                return c.substring(name.length, c.length);
            }
        }
        return "";
    }


    function new_task(newtask, taskDate) {
        let task_input = document.getElementById('task');
        let date_input = document.getElementById('date');

        let task_name = newtask;

            return false
        }


        task_input.value = "";
        task_input.focus();



        let existing = getCookie("tasks");
        let updated = existing === ""? task_name : existing + "|" + task_name;
        console.log(updated);
        setCookie("tasks", updated, 15);


        if (existing === "") {
            existing = task_name;
        } else {
            existing = existing + " " + task_name;
        }

        let new_div = document.createElement("div");
        document.getElementById("task_list").appendChild(new_div);

        let checkbox = document.createElement("input");
        // checkbox.setAttribute("onchange", "function strike_(box) {\n" +

        //     "        }\n" +
        //     "    }\n" +
        //     "    strike_(this)")
        checkbox.type = "checkbox";
        new_div.appendChild(checkbox)

        let span = document.createElement("span");

        new_div.setAttribute("class", "task");
        span.innerText = task_name;

        if (taskDate) {

        console.log(new_div);
        console.log(task_input.value);
