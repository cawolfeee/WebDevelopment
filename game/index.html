<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordle Category</title>
</head>
<body>

<h1>Wordle Category Game:</h1>

<select>
  <option hidden="">Category Options</option>
  <option>Sports ⚽️🏈🎾⚾️🏐🏒🏀</option>
  <option>Foods 🍔🍕🥗🍣🍪🍨🥯</option>
  <option>Animals 🐶🐷🐢🐥🐠🪼🐝 </option>
</select>

<br>
<br>
<br>

<div id="grid">
  <div class="row">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>
  <div class="row">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>
  <div class="row">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>
  <div class="row">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>
  <div class="row">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>
</div>

</body>

<style>
  h1 {
    font-size: 50px;
    font-family: Georgia, serif;
    text-shadow: #a044f6 3px 1px 1px;
    text-align: center;
    border: 3px #5e1eff solid;
    padding: 10px;
    margin: 20px;
    background-color: #b487eb;
    color: #e7e4ff;
    animation: colorCycle 3s infinite;
  }

  @keyframes colorCycle {
    0%   { color: #560ed3; }
    25%  { color: #5728e3; }
    50%  { color: #723cdf; }
    75%  { color: #8859ed; }
    100% { color: #b895f6; }
  }

  .tile {
    width: 100px;
    height: 100px;
    border: 3px #8963f4 solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-family: Georgia, serif;
    font-weight: bold;
    color: #3a0099;
    text-transform: uppercase;
  }

  .row {
    display: flex;
  }

  #grid {
    width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  select {
    font-size: 20px;
    font-family: Georgia, serif;
    background-color: #b487eb;
    color: #e7e4ff;
    border: 3px #5e1eff solid;
    padding: 10px;
    margin: 20px;
  }




</style>

<script>
  let currentRow = 0;
  let currentTile = 0;

  document.addEventListener("keydown", function(e) {
    let rows = document.getElementsByClassName('row');
    let tiles = rows[currentRow].getElementsByClassName('tile');

    if (e.key.length === 1 && currentTile < 5) {
      tiles[currentTile].textContent = e.key.toUpperCase();
      currentTile = currentTile + 1;
    }

    if (e.key === "Backspace" && currentTile > 0) {
      currentTile--;
      tiles[currentTile].textContent = "";
    }

    if (e.key === "Enter" && currentTile === 5 && currentRow < 4) {
      currentRow++;
      currentTile = 0;
    }
  });
</script>

</html>
