<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wordle Category</title>
</head>
<body>
<h1>Wordle Category Game:</h1>

<select id="categorySelect">
  <option hidden="">Category Options</option>
  <option value="SCORE">Sports ⚽️🏈🎾⚾️🏐🏒🏀</option>
  <option value="TACOS">Foods 🍔🍕🥗🍣🍪🍨🥯</option>
  <option value="ZEBRA">Animals 🐶🐷🐢🦈🐥🐠🪼 </option>
</select>

<br>
<br>
<br>

<div id="instructionsPopupOverlay" class="hidden">
    <div class="instructionsPopupBox">
      <button id="closePopup">&times;</button>
      <h3>Welcome to this game!</h3>
      <b>Instructions: guess words related to the category! You may choose between Sports, Foods, or Animals. ENJOY!</b>
    </div>
</div>



<div id="grid">
  <div class="row">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>
  <div class="row">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>
  <div class="row">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>
  <div class="row">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>
  <div class="row">
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
    <div class="tile"></div>
  </div>
</div>

</body>

<style>
  h1 {
    font-size: 50px;
    font-family: Georgia, serif;
    text-shadow: #a044f6 3px 1px 1px;
    text-align: center;
    border: 3px #5e1eff solid;
    padding: 10px;
    margin: 20px;
    background-color: #b487eb;
    color: #e7e4ff;
    animation: colorCycle 3s infinite;
  }

  @keyframes colorCycle {
    0%   { color: #560ed3; }
    25%  { color: #5728e3; }
    50%  { color: #723cdf; }
    75%  { color: #8859ed; }
    100% { color: #b895f6; }
  }

  .tile {
    width: 100px;
    height: 100px;
    border: 3px #8963f4 solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 48px;
    font-family: Georgia, serif;
    font-weight: bold;
    color: #3a0099;
    text-transform: uppercase;
    transition: background-color 0.1s, border-color 0.1s;
  }

  .tile.active {
    background-color: #dcc8ff;
    border-color: #5e1eff;
    border-width: 4px;
  }

  .row {
    display: flex;
  }

  #grid {
    width: 500px;
    margin-left: auto;
    margin-right: auto;
  }

  select {
    font-size: 20px;
    font-family: Georgia, serif;
    background-color: #b487eb;
    color: #e7e4ff;
    border: 3px #5e1eff solid;
    padding: 10px;
    margin: 20px;
  }

  select:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }


  #instructionsPopupOverlay {
    position: fixed;
    top: 0;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease;
  }
  .instructionsPopupBox {
    background: white;
    padding: 30px;
    border-radius: 8px;
    position: relative;
    min-width: 300px;
  }
  #closePopup {
    position: absolute;
    top: 10px;
    right: 15px;
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
  }
  #instructionsPopupOverlay.visible{
    opacity: 1;
    visibility: visible;
  }
</style>

<script>
  let currentRow = 0;
  let currentTile = 0;
  let targetWord = "";

  document.getElementById("categorySelect").addEventListener("change", function() {
    targetWord = this.value;
    currentRow = 0;
    currentTile = 0;

    let tiles = document.getElementsByClassName('tile');
    for (let t = 0; t < tiles.length; t++) {
      tiles[t].textContent = "";
      tiles[t].style.backgroundColor = "";
    }

    this.disabled = false;
    updateHighlight();
  });

  function updateHighlight() {
    document.querySelectorAll('.tile').forEach(t => t.classList.remove('active'));
    let rows = document.getElementsByClassName('row');
    let tiles = rows[currentRow].getElementsByClassName('tile');
    if (currentTile < 5) {
      tiles[currentTile].classList.add('active');
    }
  }

  function checkGuess() {
    let rows = document.getElementsByClassName('row');
    let tiles = rows[currentRow].getElementsByClassName('tile');

    let guess = tiles[0].textContent + tiles[1].textContent + tiles[2].textContent + tiles[3].textContent + tiles[4].textContent;

    if (guess[0] === targetWord[0]) {
      tiles[0].style.backgroundColor = "hotpink";
    } else if (targetWord.includes(guess[0])) {
      tiles[0].style.backgroundColor = "lightpink";
    } else {
      tiles[0].style.backgroundColor = "gray";
    }

    if (guess[1] === targetWord[1]) {
      tiles[1].style.backgroundColor = "hotpink";
    } else if (targetWord.includes(guess[1])) {
      tiles[1].style.backgroundColor = "lightpink";
    } else {
      tiles[1].style.backgroundColor = "gray";
    }

    if (guess[2] === targetWord[2]) {
      tiles[2].style.backgroundColor = "hotpink";
    } else if (targetWord.includes(guess[2])) {
      tiles[2].style.backgroundColor = "lightpink";
    } else {
      tiles[2].style.backgroundColor = "gray";
    }

    if (guess[3] === targetWord[3]) {
      tiles[3].style.backgroundColor = "hotpink";
    } else if (targetWord.includes(guess[3])) {
      tiles[3].style.backgroundColor = "lightpink";
    } else {
      tiles[3].style.backgroundColor = "gray";
    }

    if (guess[4] === targetWord[4]) {
      tiles[4].style.backgroundColor = "hotpink";
    } else if (targetWord.includes(guess[4])) {
      tiles[4].style.backgroundColor = "lightpink";
    } else {
      tiles[4].style.backgroundColor = "gray";
    }
  }

  window.addEventListener('DOMContentLoaded', () =>{
    const overlay = document.getElementById('instructionsPopupOverlay');
    const closeBtn = document.getElementById('closePopup');

    // shows popup on load
    overlay.classList.add('visible');

    // hides popup when button is pressed
    closeBtn.addEventListener('click', () => {
      overlay.classList.remove('visible');
    })
  })

  document.addEventListener("keydown", function(e) {
    if (targetWord === "") return;

    let rows = document.getElementsByClassName('row');
    let tiles = rows[currentRow].getElementsByClassName('tile');

    if (e.key.length === 1 && e.key.match(/[a-zA-Z]/) && currentTile < 5) {
      tiles[currentTile].textContent = e.key.toUpperCase();
      currentTile = currentTile + 1;
      document.getElementById("categorySelect").disabled = true;
    }

    if (e.key === "Backspace" && currentTile > 0) {
      currentTile = currentTile - 1;
      tiles[currentTile].textContent = "";
    }

    if (e.key === "Enter" && currentTile === 5 && currentRow < 5) {
      checkGuess();
      if (currentRow < 4) {
        currentRow = currentRow + 1;
        currentTile = 0;
      }
    }

    updateHighlight();
  });
</script>

</html>
