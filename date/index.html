<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Date</title>
</head>
<body>
  <h1>Date</h1>
</body>

<script>
  let now = new Date();
  console.log(now)
  console.log("Now:" + now.getTime())

  let then = new Date("12/31/26  10:00:00");
  console.log("Then:" + then);

  console.log((then - now) / 1000 / 60 / 60 / 24);
</script>

</html>
