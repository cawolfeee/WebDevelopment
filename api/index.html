<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dog API</title>
</head>
<body>
<h1>Dog API</h1>
<img id="dog-img" src="" alt="Random Dog" width="400">

<script>
  let url = "https://dog.ceo/api/breeds/image/random"

  fetch(url)
          .then(function(response) {
            return response.json()
          })
          .then(function(data) {
            console.log(data)
            document.getElementById("dog-img").src = data.message
          })
          .catch(function(error) {
            console.log("Fetch error:", error)
          })
</script>
</body>
</html>
