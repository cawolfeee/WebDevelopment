<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dog API</title>
</head>
<body>

<style>
  body{
    background-color: #cfb1ff;
  }
</style>

<h1>Animal API</h1>

<select id="animal-select">
  <option value="https://dog.ceo/api/breeds/image/random">Dog</option>
  <option value="https://randomfox.ca/floof/">Fox</option>
  <option value="https://api.thecatapi.com/v1/images/search">Cat</option>
</select>

<br><br>

<img id="animal-img" src="" alt="Random Animal" width="400">

<script>
  let select = document.getElementById("animal-select")
  let img = document.getElementById("animal-img")

  function fetchAnimal() {
    let url = select.value

    fetch(url)
            .then(function(response) {
              return response.json()
            })
            .then(function(data) {
              if (data.message) img.src = data.message  // dog
              if (data.image) img.src = data.image      // fox
              if (Array.isArray(data)) img.src = data[0].url  // cat
            })
            .catch(function(error) {
              console.log("Fetch error:", error)
            })
  }

  select.onchange = fetchAnimal
  fetchAnimal()
</script>
</body>
</html>
